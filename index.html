<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杏花AI填空节 - 边玩边懂AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微软雅黑', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fff5e6 0%, #ffe6f0 50%, #f0e6ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body.festival-glow {
            animation: festivalGlow 1.2s ease;
        }

        @keyframes festivalGlow {
            0% { filter: saturate(1) brightness(1); }
            35% { filter: saturate(1.35) brightness(1.08); }
            100% { filter: saturate(1) brightness(1); }
        }

        /* 樱花/杏花飘落效果 */
        @keyframes fall {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }

        .flower {
            position: fixed;
            width: 20px;
            height: 20px;
            font-size: 20px;
            opacity: 0.6;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .sparkle {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            z-index: 30;
            animation: sparkleFly 900ms ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.15);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.15);
            max-width: 850px;
            width: 100%;
            padding: 45px;
            position: relative;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 245, 238, 0.98) 100%);
            border: 2px solid rgba(255, 182, 193, 0.3);
        }

        .container.festival-pop {
            animation: festivalPop 0.8s ease;
        }

        @keyframes festivalPop {
            0% { transform: scale(1); }
            25% { transform: scale(1.015); }
            55% { transform: scale(0.995); }
            100% { transform: scale(1); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #d4a373 0%, #e6b8a2 50%, #ff69b4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header .emoji {
            font-size: 40px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .header .subtitle {
            color: #d4a373;
            font-size: 15px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .header .desc {
            color: #999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .stats-container {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe6f0 100%);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 182, 193, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .stat-item {
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid rgba(255, 182, 193, 0.15);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 163, 115, 0.3);
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.1);
        }

        .stat-label {
            color: #999;
            font-size: 11px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .streak-mark {
            margin-top: 8px;
            font-size: 16px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-bar {
            height: 10px;
            background: #e0d5cc;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a373, #ff69b4);
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            color: #999;
            font-size: 12px;
        }

        .question-container {
            background: linear-gradient(135deg, #fff8f3 0%, #fffaf5 100%);
            border-left: 5px solid #d4a373;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(212, 163, 115, 0.08);
            border: 2px solid rgba(255, 182, 193, 0.15);
        }

        .question-title {
            color: #d4a373;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 12px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .question-text {
            font-size: 17px;
            line-height: 2;
            color: #333;
            margin-bottom: 18px;
            word-break: break-word;
            font-weight: 500;
        }

        .blank {
            display: inline-block;
            background: linear-gradient(135deg, #fff3cd, #ffe6f0);
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: bold;
            position: relative;
        }

        .blank input {
            width: 100%;
            padding: 6px 8px;
            border: 2px solid #d4a373;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            min-width: 50px;
            background: white;
            color: #333;
        }

        .blank input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
            background: #fffaf5;
        }

        .hint {
            background: linear-gradient(135deg, #f0f8ff, #ffe6f0);
            border-left: 4px solid #ff69b4;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #d4a373;
            border: 2px solid rgba(255, 105, 180, 0.15);
        }

        .hint-icon {
            margin-right: 10px;
            font-size: 16px;
        }

        .hint-toggle {
            cursor: pointer;
            color: #ff69b4;
            font-weight: bold;
            text-decoration: underline;
            margin-left: 5px;
        }

        .combo-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            animation: comboFloat 1s ease-out;
        }

        @keyframes comboFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1.5);
            }
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #d4a373, #e6b8a2);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 163, 115, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-skip {
            background: white;
            color: #d4a373;
            border: 2px solid #d4a373;
        }

        .btn-skip:hover {
            background: #fff5e6;
            transform: translateY(-3px);
        }

        .btn-hint {
            background: linear-gradient(135deg, #ffd166, #f4a261);
            color: white;
            max-width: 170px;
            flex: 0 0 170px;
        }

        .btn-hint:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(244, 162, 97, 0.35);
        }

        .btn-hint:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .feedback {
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.4s ease;
            font-weight: 500;
        }

        .feedback.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback.correct {
            background: linear-gradient(135deg, #d4edda 0%, #ffe6f0 100%);
            border-left: 5px solid #28a745;
            color: #155724;
            border: 2px solid rgba(40, 167, 69, 0.2);
        }

        .feedback.incorrect {
            background: linear-gradient(135deg, #f8d7da 0%, #fff5e6 100%);
            border-left: 5px solid #dc3545;
            color: #721c24;
            border: 2px solid rgba(220, 53, 69, 0.2);
        }

        .feedback-icon {
            margin-right: 10px;
            font-size: 20px;
        }

        .answer-reveal {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 14px;
            color: #555;
        }

        .completion-screen {
            text-align: center;
            display: none;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .completion-screen.show {
            display: block;
        }

        .completion-screen .emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        .completion-screen h2 {
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .completion-screen p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.8;
            font-size: 15px;
        }

        .completion-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .completion-stat {
            background: linear-gradient(135deg, #fff5e6, #ffe6f0);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid rgba(255, 182, 193, 0.2);
        }

        .completion-stat-label {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .completion-stat-value {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .final-score {
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            color: white;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(212, 163, 115, 0.3);
            position: relative;
            overflow: hidden;
        }

        .final-score::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: moveGradient 20s linear infinite;
        }

        @keyframes moveGradient {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .final-score-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .final-score-label {
            font-size: 16px;
            margin-bottom: 12px;
            opacity: 0.95;
        }

        .final-score-value {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .final-score-rank {
            font-size: 18px;
            opacity: 0.9;
        }

        .btn-restart {
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            color: white;
            padding: 16px 50px;
            font-size: 16px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3);
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(212, 163, 115, 0.4);
        }

        .easter-egg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #d4a373, #ff69b4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3);
            z-index: 20;
            transition: all 0.3s ease;
        }

        .easter-egg:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 8px 25px rgba(212, 163, 115, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 25;
            animation: toastSlide 0.3s ease;
        }

        .tap-float {
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 35;
            font-size: 24px;
            animation: tapFloatUp 900ms ease-out forwards;
        }

        @keyframes tapFloatUp {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.7);
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -120px) scale(1.2);
            }
        }

        @keyframes toastSlide {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 10px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .question-text {
                font-size: 15px;
                line-height: 1.8;
            }

            .buttons {
                flex-direction: column;
            }

            .completion-screen .emoji {
                font-size: 50px;
            }

            .final-score-value {
                font-size: 40px;
            }

            .completion-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 飘落的花瓣 -->
    <div id="flowers"></div>

    <div class="container">
        <div class="header">
            <h1>
                <span class="emoji">🌸</span>
                <span>杏花AI填空节</span>
                <span class="emoji">🤖</span>
            </h1>
            <p class="subtitle">✨ 春风十里，与AI互动 ✨</p>
            <p class="desc">根据上下文推断缺失的词汇，体验大脑与AI的思维方式</p>
        </div>

        <div class="stats-container">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">😊 当前得分</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">🔥 连击</div>
                    <div class="stat-value" id="streak">0</div>
                    <div class="streak-mark" id="streakMark" style="display: none;">🔥🔥🔥</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">📍 准确率</div>
                    <div class="stat-value"><span id="accuracy">0</span>%</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">⏳ 进度</div>
                    <div class="stat-value"><span id="currentQuestion">0</span>/<span id="totalQuestions">0</span></div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="progress-text">完成度：<span id="progressPercent">0</span>%</div>
        </div>

        <div id="gameScreen">
            <div class="question-container">
                <div class="question-title">
                    <span>🎯 第 <span id="qNum">1</span> 关</span>
                </div>
                <p class="question-text" id="questionText"></p>
                <div class="hint" id="hint" style="display: none;">
                    <span class="hint-icon">💡</span>
                    <span id="hintText"></span>
                    <span class="hint-toggle" id="hintToggle" style="display: none;" onclick="toggleHint()">点击查看提示</span>
                </div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="buttons">
                <button class="btn-submit" id="submitBtn">检查答案</button>
                <button class="btn-skip" id="skipBtn">跳过这题</button>
                <button class="btn-hint" id="hintBtn">查看提示(-2分)</button>
            </div>
        </div>

        <div class="completion-screen" id="completionScreen">
            <div class="emoji" id="resultEmoji"></div>
            <h2 id="resultTitle"></h2>
            <p id="resultMessage"></p>
            
            <div class="completion-stats">
                <div class="completion-stat">
                    <div class="completion-stat-label">最高连击</div>
                    <div class="completion-stat-value" id="maxStreak">0</div>
                </div>
                <div class="completion-stat">
                    <div class="completion-stat-label">整体准确率</div>
                    <div class="completion-stat-value" id="finalAccuracy">0%</div>
                </div>
                <div class="completion-stat">
                    <div class="completion-stat-label">用时(秒)</div>
                    <div class="completion-stat-value" id="timeCost">0</div>
                </div>
            </div>

            <div class="final-score">
                <div class="final-score-content">
                    <div class="final-score-label">🎊 最终得分 🎊</div>
                    <div class="final-score-value"><span id="finalScore">0</span> 分</div>
                    <div class="final-score-rank" id="finalRank"></div>
                </div>
            </div>
            <button class="btn-restart" id="restartBtn">🎮 再来一局</button>
        </div>
    </div>

    <!-- 彩蛋按钮 -->
    <div class="easter-egg" id="easterEgg">🌺</div>

    <script>
        // 题库数据 - 改成更通俗易懂，日常与AI相关的题目
        const questions = [
            {
                text: "当你问Siri或小爱同学天气怎么样时，它们是通过____你的声音来理解你的意思。",
                keywords: ["识别", "理解", "分析", "处理"],
                hint: "AI需要把你的声音信号变成文字才能理解",
                explanation: "语音识别是AI与我们交互的第一步"
            },
            {
                text: "你在抖音或小红书上点赞和观看的内容，APP会记录下来，用这些数据来____你喜欢什么样的内容。",
                keywords: ["推荐", "推测", "判断", "分析"],
                hint: "根据你的兴趣爱好来____",
                explanation: "AI通过用户行为来学习和个性化推荐"
            },
            {
                text: "ChatGPT、文心一言这样的聊天机器人，本质上是在____前面的文字，来预测下一个词该是什么。",
                keywords: ["阅读", "看", "分析", "理解"],
                hint: "就像你写文章时，脑子里会想前面写了什么，再决定后面怎么写",
                explanation: "大语言模型就是通过理解前文来生成回答"
            },
            {
                text: "有些手机会在你输入时自动____你想输入的下一个词，这也是AI在起作用。",
                keywords: ["补全", "猜测", "预测", "完成"],
                hint: "你输入'你好'，手机可能会自动出现'你好吗'的选项",
                explanation: "文本预测让输入变得更快更方便"
            },
            {
                text: "人脸识别解锁手机、支付宝刷脸支付、海关的边检系统，都是AI中的____技术在发挥作用。",
                keywords: ["识别", "检测", "分析"],
                hint: "AI能看出你的脸部特征，确认你就是你",
                explanation: "计算机视觉让机器能'看'世界"
            },
            {
                text: "当你在网购时，有些AI系统会____你之前买过的东西和浏览的记录，给你推荐可能喜欢的商品。",
                keywords: ["查看", "查重", "学习", "回忆"],
                hint: "系统在参考你的购物历史",
                explanation: "推荐算法让购物变得更有趣"
            },
            {
                text: "自动驾驶汽车需要用AI对周围的行人、车辆、信号灯等信息进行____，才能安全行驶。",

                hint: "汽车要'看清'道路上的各种情况",

            },
            {

                keywords: ["分析", "检查", "查看", "识别"],
                hint: "AI医生在'看'你的医学影像",
                explanation: "AI在医疗领域已经很有用处了"
            },
            {

                keywords: ["理解", "领会", "抓住"],
                hint: "翻译的关键是先明白你想说什么",
                explanation: "语义理解是翻译的核心"
            },
            {
                text: "当你用搜索引擎时，它会从海量网页中____最相关的内容给你，这背后也是AI排序技术。",
                keywords: ["找到", "挑出", "选出", "搜索"],
                hint: "在茫茫网海中为你____最想要的信息",
                explanation: "信息检索和排序让搜索更精准"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let maxStreak = 0;
        let answered = false;
        let answers = {};
        let correct = 0;
        let completedCount = 0;
        let startTime = Date.now();
        let hintShown = false;

        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const accuracyEl = document.getElementById('accuracy');
        const totalQuestionsEl = document.getElementById('totalQuestions');
        const currentQuestionEl = document.getElementById('currentQuestion');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const questionTextEl = document.getElementById('questionText');
        const hintEl = document.getElementById('hint');
        const hintTextEl = document.getElementById('hintText');
        const hintToggle = document.getElementById('hintToggle');
        const feedbackEl = document.getElementById('feedback');
        const submitBtn = document.getElementById('submitBtn');
        const skipBtn = document.getElementById('skipBtn');
        const hintBtn = document.getElementById('hintBtn');
        const qNumEl = document.getElementById('qNum');
        const gameScreen = document.getElementById('gameScreen');
        const completionScreen = document.getElementById('completionScreen');
        const restartBtn = document.getElementById('restartBtn');
        const easterEgg = document.getElementById('easterEgg');
        const containerEl = document.querySelector('.container');
        const streakMarkEl = document.getElementById('streakMark');

        function showFatalError(message) {
            questionTextEl.textContent = message;
            feedbackEl.className = 'feedback incorrect show';
            feedbackEl.innerHTML = '<span class="feedback-icon">⚠</span>页面初始化异常，请刷新后重试。';
            submitBtn.disabled = true;
            skipBtn.disabled = true;
            hintBtn.disabled = true;
        }

        // 初始化花瓣
        function initFlowers() {
            const flowersContainer = document.getElementById('flowers');
            const flowers = ['🌸', '🌼', '🌺', '🌻'];
            for (let i = 0; i < 8; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.top = -20 + 'px';
                flower.style.animationDuration = (5 + Math.random() * 5) + 's';
                flower.style.animationDelay = Math.random() * 2 + 's';
                flowersContainer.appendChild(flower);
            }
        }

        // 彩蛋功能
        easterEgg.addEventListener('click', () => {
            triggerFestivalSurprise();
        });

        function createPetalBurst(count = 24, speed = 3) {
            const flowersRoot = document.getElementById('flowers');
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower';
                    flower.textContent = Math.random() > 0.3 ? '🌸' : '🌺';
                    flower.style.left = Math.random() * 100 + 'vw';
                    flower.style.top = -20 + 'px';
                    flower.style.animationDuration = speed + Math.random() * 1.3 + 's';
                    flowersRoot.appendChild(flower);
                    setTimeout(() => flower.remove(), (speed + 1.5) * 1000);
                }, i * 45);
            }
        }

        function createSparkleBurst() {
            const cx = window.innerWidth * (0.25 + Math.random() * 0.5);
            const cy = window.innerHeight * (0.2 + Math.random() * 0.45);
            const symbols = ['✨', '💮', '🌸', '⭐'];
            for (let i = 0; i < 14; i++) {
                const sp = document.createElement('div');
                sp.className = 'sparkle';
                sp.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                const angle = (Math.PI * 2 * i) / 14;
                const dist = 80 + Math.random() * 140;
                sp.style.left = cx + 'px';
                sp.style.top = cy + 'px';
                sp.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
                sp.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
                document.body.appendChild(sp);
                setTimeout(() => sp.remove(), 950);
            }
        }

        function pulseFestivalTheme() {
            document.body.classList.remove('festival-glow');
            containerEl.classList.remove('festival-pop');
            void document.body.offsetWidth;
            document.body.classList.add('festival-glow');
            containerEl.classList.add('festival-pop');
            setTimeout(() => {
                document.body.classList.remove('festival-glow');
                containerEl.classList.remove('festival-pop');
            }, 1250);
        }

        function triggerFestivalSurprise() {
            const modes = [
                () => {
                    showToast('🌸 春风十里杏花香 🌸', 2200);
                    createPetalBurst(28, 2.8);
                },
                () => {
                    showToast('🤖 AI灵感涌现中...', 2200);
                    pulseFestivalTheme();
                    createSparkleBurst();
                },
                () => {
                    showToast('🎉 杏花节幸运时刻！', 2200);
                    createPetalBurst(18, 2.4);
                    createSparkleBurst();
                },
                () => {
                    showToast('✨ 随机祝福：今天的你答题超顺！', 2400);
                    pulseFestivalTheme();
                }
            ];

            const pick = modes[Math.floor(Math.random() * modes.length)];
            pick();
        }

        function showToast(msg, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        function showComboAlert(text) {
            const combo = document.createElement('div');
            combo.className = 'combo-alert';
            combo.textContent = text;
            document.body.appendChild(combo);
            setTimeout(() => combo.remove(), 1000);
        }

        function renderStreakMark() {
            if (streak <= 0) {
                streakMarkEl.style.display = 'none';
                return;
            }
            const flameCount = Math.min(streak, 8);
            streakMarkEl.textContent = '🔥'.repeat(flameCount);
            streakMarkEl.style.display = 'block';
        }

        function spawnTapReaction(x, y) {
            const symbols = ['🌸', '💮', '💗', '✨', '👍'];
            const icon = document.createElement('div');
            icon.className = 'tap-float';
            icon.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            icon.style.left = x + 'px';
            icon.style.top = y + 'px';
            document.body.appendChild(icon);
            setTimeout(() => icon.remove(), 950);
        }

        function init() {
            totalQuestionsEl.textContent = questions.length;
            loadQuestion();
            initFlowers();
            document.addEventListener('click', (e) => {
                if (e.target.closest('.container') || e.target.closest('.easter-egg')) {
                    return;
                }
                spawnTapReaction(e.clientX, e.clientY);
            });
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showCompletion();
                return;
            }

            answered = false;
            hintShown = false;
            feedbackEl.classList.remove('show');
            qNumEl.textContent = currentQuestionIndex + 1;
            currentQuestionEl.textContent = completedCount;

            const question = questions[currentQuestionIndex];
            if (!question || !question.text) {
                showFatalError('题目加载失败，请刷新页面后再试。');
                return;
            }

            renderQuestion(question);
            
            hintTextEl.textContent = question.hint;
            hintToggle.style.display = 'none';
            hintEl.style.display = 'none';
            hintBtn.disabled = false;
            
            submitBtn.textContent = '检查答案';
            submitBtn.disabled = false;
            skipBtn.textContent = '跳过这题';
            skipBtn.disabled = false;
            skipBtn.style.display = 'block';
            updateProgress();
        }

        function renderQuestion(question) {
            let html = question.text;
            let inputCount = 0;

            // 替换所有____为输入框
            html = html.replace(/____/g, () => {
                const inputId = `input${inputCount}`;
                const savedValue = answers[currentQuestionIndex]?.[inputCount] || '';
                inputCount++;
                return `<span class="blank"><input type="text" id="${inputId}" value="${savedValue}" placeholder="填空"></span>`;
            });

            // 容错：若题目意外未包含空位占位符，自动补一个输入框，避免无法作答
            if (inputCount === 0) {
                html += ' <span class="blank"><input type="text" id="input0" placeholder="填空"></span>';
                inputCount = 1;
            }

            questionTextEl.innerHTML = html;

            setTimeout(() => {
                const firstInput = document.getElementById('input0');
                if (firstInput) firstInput.focus();
            }, 100);

            const inputs = document.querySelectorAll('.blank input');
            inputs.forEach((input, index) => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        if (index === inputs.length - 1) {
                            submitAnswer();
                        } else {
                            inputs[index + 1].focus();
                        }
                    }
                });
            });
        }

        function useHint() {
            if (answered) return;
            hintEl.style.display = 'block';
            hintBtn.disabled = true;
            if (score >= 2) {
                score -= 2;
                scoreEl.textContent = score;
            }
            showToast('💡 已显示提示，扣除2分');
        }

        // 灵活的答案匹配
        function checkAnswer(userAnswer, keywords) {
            userAnswer = userAnswer.trim().toLowerCase();
            if (!userAnswer) return false;

            // 完全匹配
            if (keywords.some(k => k.toLowerCase() === userAnswer)) {
                return true;
            }

            // 包含关键字
            if (keywords.some(k => userAnswer.includes(k.toLowerCase()) || k.toLowerCase().includes(userAnswer))) {
                return true;
            }

            // 相似度匹配（简单的字符重叠）
            for (let keyword of keywords) {
                const keywordLower = keyword.toLowerCase();
                if (similarity(userAnswer, keywordLower) > 0.6) {
                    return true;
                }
            }

            return false;
        }

        // 简单的字符串相似度算法
        function similarity(s1, s2) {
            let longer = s1.length > s2.length ? s1 : s2;
            let shorter = s1.length > s2.length ? s2 : s1;
            
            if (longer.length === 0) return 1.0;
            
            const editDistance = getEditDistance(longer, shorter);
            return (longer.length - editDistance) / longer.length;
        }

        function getEditDistance(s1, s2) {
            const costs = [];
            for (let i = 0; i <= s1.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= s2.length; j++) {
                    if (i === 0) {
                        costs[j] = j;
                    } else if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) !== s2.charAt(j - 1)) {
                            newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        }
                        costs[j - 1] = lastValue;
                        lastValue = newValue;
                    }
                }
                if (i > 0) costs[s2.length] = lastValue;
            }
            return costs[s2.length];
        }

        function submitAnswer() {
            if (answered) return;
            
            answered = true;
            const question = questions[currentQuestionIndex];
            const inputs = document.querySelectorAll('.blank input');
            const userAnswers = Array.from(inputs).map(input => input.value.trim());

            if (userAnswers.some(answer => !answer)) {
                answered = false;
                showToast('请先填写后再检查答案');
                return;
            }

            answers[currentQuestionIndex] = userAnswers;

            // 检查答案
            let isCorrect = userAnswers.every((answer, i) => 
                checkAnswer(answer, question.keywords)
            );

            showFeedback(isCorrect, question, userAnswers);
        }

        function showFeedback(isCorrect, question, userAnswers) {
            const feedbackMessages = {
                correct: [
                    '🎉 完美！你选择了最恰当的词！',
                    '✨ 太棒了！你理解了这个语境！',
                    '👏 正确！你的语义感知能力很强！',
                    '🌟 太好了！这就是AI的思维方式！',
                    '💫 棒极了！你和AI想的一样！'
                ],
                incorrect: [
                    '❌ 不太对，看看下面的解释吧',
                    '🤔 再想想，换个词试试？',
                    '💭 有点偏离，看看正确答案',
                    '🔍 还差一点，看看提示吧',
                    '👀 试试其他相关的词汇'
                ]
            };

            if (isCorrect) {
                score += 10;
                correct++;
                streak += 1;
                if (streak > maxStreak) maxStreak = streak;
                
                feedbackEl.className = 'feedback correct show';
                const msg = feedbackMessages.correct[Math.floor(Math.random() * feedbackMessages.correct.length)];
                feedbackEl.innerHTML = `<span class="feedback-icon">✓</span>${msg}`;

                // 连击特效
                if (streak >= 3) {
                    showComboAlert(`🔥 ${streak}连击！`);
                }
                if (streak >= 5) {
                    showToast(`⭐ 已达 ${streak} 连击！再接再厉！`);
                }
            } else {
                streak = 0;
                feedbackEl.className = 'feedback incorrect show';
                const msg = feedbackMessages.incorrect[Math.floor(Math.random() * feedbackMessages.incorrect.length)];
                let html = `<span class="feedback-icon">✗</span>${msg}`;
                html += `<div class="answer-reveal">📝 参考词汇：${question.keywords.join(' / ')}<br><br>💡 ${question.explanation}</div>`;
                feedbackEl.innerHTML = html;
            }

            scoreEl.textContent = score;
            streakEl.textContent = streak;
            renderStreakMark();
            completedCount++;
            currentQuestionEl.textContent = completedCount;
            updateProgress();
            updateAccuracy();
            
            submitBtn.textContent = '下一题 →';
            submitBtn.disabled = false;
            skipBtn.style.display = 'none';
            hintBtn.disabled = true;
        }

        function updateAccuracy() {
            const totalAnswered = completedCount;
            if (totalAnswered === 0) {
                accuracyEl.textContent = '0';
                return;
            }
            const acc = Math.round((correct / totalAnswered) * 100);
            accuracyEl.textContent = acc;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }

        function skipQuestion() {
            if (answered) {
                nextQuestion();
                return;
            }

            streak = 0;
            streakEl.textContent = '0';
            renderStreakMark();
            completedCount++;
            currentQuestionEl.textContent = completedCount;
            updateProgress();
            updateAccuracy();
            showToast('已跳过本题，继续下一题');
            nextQuestion();
        }

        function updateProgress() {
            const progress = (completedCount / questions.length) * 100;
            progressFill.style.width = progress + '%';
            progressPercent.textContent = Math.round(progress);
        }

        function toggleHint() {
            hintEl.style.display = hintEl.style.display === 'none' ? 'block' : 'none';
            hintToggle.textContent = hintEl.style.display === 'none' ? '点击查看提示' : '隐藏提示';
        }

        function showCompletion() {
            gameScreen.style.display = 'none';
            completionScreen.classList.add('show');

            const timeCost = Math.floor((Date.now() - startTime) / 1000);
            const accuracy = Math.round((correct / questions.length) * 100);
            let emoji, title, message, rank;

            if (accuracy === 100) {
                emoji = '🏆';
                title = '完美！你是AI语言大师！';
                message = `你展现出了超强的语义理解能力，连AI都要向你学习！恭喜获得满分！`;
                rank = '🌟 S级 - 完美大师';
            } else if (accuracy >= 80) {
                emoji = '⭐';
                title = '太棒了！你很有天赋！';
                message = `你准确理解了大多数语义，正确率 ${accuracy}%，你的思路已经和AI很接近了！`;
                rank = '🎯 A级 - 高手玩家';
            } else if (accuracy >= 60) {
                emoji = '😊';
                title = '不错！你进步了！';
                message = `你对语义有了基本理解，正确率 ${accuracy}%。多玩几次会更厉害！`;
                rank = '💪 B级 - 进阶玩家';
            } else if (accuracy >= 40) {
                emoji = '🎮';
                title = '加油！再来一遍！';
                message = `你对AI思维还在摸索阶段，正确率 ${accuracy}%。继续挑战自己吧！`;
                rank = '🌱 C级 - 新手玩家';
            } else {
                emoji = '🚀';
                title = '这才是开始！';
                message = `你开启了AI之旅，正确率 ${accuracy}%。多体验几次，你会越来越强！`;
                rank = '🔥 D级 - 入门阶段';
            }

            document.getElementById('resultEmoji').textContent = emoji;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('maxStreak').textContent = maxStreak;
            document.getElementById('timeCost').textContent = timeCost;
            document.getElementById('finalRank').textContent = rank;
        }

        function restart() {
            currentQuestionIndex = 0;
            score = 0;
            streak = 0;
            maxStreak = 0;
            answered = false;
            answers = {};
            correct = 0;
            completedCount = 0;
            startTime = Date.now();
            hintShown = false;

            scoreEl.textContent = score;
            streakEl.textContent = streak;
            accuracyEl.textContent = '0';
            currentQuestionEl.textContent = '0';
            progressFill.style.width = '0%';
            progressPercent.textContent = '0';
            renderStreakMark();
            gameScreen.style.display = 'block';
            completionScreen.classList.remove('show');

            loadQuestion();
        }

        // 事件监听
        submitBtn.addEventListener('click', () => {
            if (!answered) {
                submitAnswer();
            } else {
                nextQuestion();
            }
        });

        skipBtn.addEventListener('click', skipQuestion);
        hintBtn.addEventListener('click', useHint);
        restartBtn.addEventListener('click', restart);

        // 初始化
        try {
            init();
        } catch (err) {
            console.error(err);
            showFatalError('系统初始化失败，请刷新页面重试。');
        }

        // 页面加载后的欢迎提示
        setTimeout(() => {
            showToast('🌸 欢迎来到杏花AI填空节！祝你玩得开心~ 🤖', 3000);
        }, 500);
    </script>
